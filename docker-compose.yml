# ============================================
# PRODUCTION DOCKER COMPOSE CONFIGURATION
# ============================================
# For development, use: docker-compose -f docker-compose.dev.yml up
# For production, use: docker-compose up
# ============================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mediqueue_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mediqueue}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      TZ: Asia/Jakarta
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mediqueue_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mediqueue}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - GO_VERSION=1.22
    container_name: mediqueue_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Application
      APP_PORT: ${APP_PORT:-8080}
      APP_ENV: ${APP_ENV:-production}
      TZ: Asia/Jakarta
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-mediqueue}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      
      # Admin Seeder
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mediqueue.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-Super Admin}
      
      # Redis (optional - for future caching)
      # REDIS_HOST: redis
      # REDIS_PORT: 6379
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - mediqueue_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediqueue_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
      - TZ=Asia/Jakarta
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - mediqueue_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Cache (Optional - uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: mediqueue_redis
  #   restart: unless-stopped
  #   command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - mediqueue_network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Nginx Reverse Proxy (Optional - uncomment for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: mediqueue_nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - mediqueue_network

networks:
  mediqueue_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local
