services:
  postgres:
    image: postgres:16-alpine
    container_name: mediqueue_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediqueue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediqueue_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      APP_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mediqueue
      JWT_SECRET: change-this-in-production
      JWT_EXPIRY_HOURS: 24
      ADMIN_EMAIL: admin@mediqueue.com
      ADMIN_PASSWORD: Admin@123
      ADMIN_NAME: Super Admin
    ports:
      - "8080:8080"

volumes:
  postgres_data:
